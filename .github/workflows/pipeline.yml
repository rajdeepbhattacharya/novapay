name: NovaPay Platform — CI/CD
# ============================================================
#  Datadog APJ Royal Rumble 2026
#  Required GitHub Secrets (Settings → Secrets → Actions):
#    DD_API_KEY              — Datadog API key
#    DD_APP_KEY              — Datadog Application key
#    RENDER_DEPLOY_PAYMENTS  — Render deploy hook URL
#    RENDER_DEPLOY_FRAUD     — Render deploy hook URL
#    RENDER_DEPLOY_LENDING   — Render deploy hook URL
# ============================================================

on:
  push:
    branches: [main, "degraded/**"]
  pull_request:
    branches: [main]

env:
  DD_SITE: datadoghq.com
  DD_ENV: ci
  DD_TRACE_ENABLED: "true"
  DD_CIVISIBILITY_ENABLED: "true"
  DD_CIVISIBILITY_AGENTLESS_ENABLED: "true"
  DD_CIVISIBILITY_ITR_ENABLED: "true"
  DD_CIVISIBILITY_FLAKY_RETRY_ENABLED: "true"
  MIN_COVERAGE: "60"

# ════════════════════════════════════════════════════════════
#  JOB 0: Upload git metadata to Datadog
# ════════════════════════════════════════════════════════════
jobs:
  upload-git-metadata:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @datadog/datadog-ci --silent
      - run: datadog-ci git-metadata upload
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}

# ════════════════════════════════════════════════════════════
#  JOB 1: SAST — Security scanning with bandit
# ════════════════════════════════════════════════════════════
  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install bandit --quiet
      - name: Run security scan
        run: |
          echo "=== NovaPay Security Scan ==="
          bandit -r services/payments/app services/fraud/app services/lending/app \
            -l -f txt --exit-zero 2>&1 | tee sast-summary.txt
          echo "=== HIGH Severity Findings ==="
          grep -A2 "Severity: High" sast-summary.txt || echo "None found"
          echo "=== Total Issues ==="
          grep -c "Issue:" sast-summary.txt || echo "0"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-results
          path: sast-summary.txt
          retention-days: 30

# ════════════════════════════════════════════════════════════
#  JOBS 2-4: Test (parallel across all 3 services)
# ════════════════════════════════════════════════════════════
  test-payments:
    runs-on: ubuntu-latest
    env:
      DD_SERVICE: novapay-payments
      DD_VERSION: "2.1.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r services/payments/requirements.txt --quiet
      - name: Run tests
        continue-on-error: true
        run: |
          cd services/payments
          pytest tests/ \
            --ddtrace \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: payments-results
          path: |
            services/payments/coverage.xml
            services/payments/test-results.xml
          retention-days: 7

  test-fraud:
    runs-on: ubuntu-latest
    env:
      DD_SERVICE: novapay-fraud
      DD_VERSION: "1.4.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r services/fraud/requirements.txt --quiet
      - name: Run tests
        continue-on-error: true
        run: |
          cd services/fraud
          pytest tests/ \
            --ddtrace \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fraud-results
          path: |
            services/fraud/coverage.xml
            services/fraud/test-results.xml
          retention-days: 7

  test-lending:
    runs-on: ubuntu-latest
    env:
      DD_SERVICE: novapay-lending
      DD_VERSION: "1.2.0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r services/lending/requirements.txt --quiet
      - name: Run tests
        continue-on-error: true
        run: |
          cd services/lending
          pytest tests/ \
            --ddtrace \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            -v
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lending-results
          path: |
            services/lending/coverage.xml
            services/lending/test-results.xml
          retention-days: 7

# ════════════════════════════════════════════════════════════
#  JOB 5: Quality Gate
# ════════════════════════════════════════════════════════════
  quality-gate:
    runs-on: ubuntu-latest
    needs: [test-payments, test-fraud, test-lending]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: actions/download-artifact@v4
        with:
          name: payments-results
          path: services/payments/
      - uses: actions/download-artifact@v4
        with:
          name: fraud-results
          path: services/fraud/
      - uses: actions/download-artifact@v4
        with:
          name: lending-results
          path: services/lending/
      - name: Check coverage thresholds
        run: |
          echo "========================================"
          echo "  NovaPay Quality Gate Check"
          echo "========================================"
          GATE_FAILED=0
          for SERVICE in payments fraud lending; do
            COVERAGE_FILE="services/${SERVICE}/coverage.xml"
            if [ ! -f "$COVERAGE_FILE" ]; then
              echo "MISSING coverage file for ${SERVICE}"
              GATE_FAILED=1
              continue
            fi
            COVERAGE=$(python3 -c "import xml.etree.ElementTree as ET; root = ET.parse('${COVERAGE_FILE}').getroot(); print(round(float(root.attrib.get('line-rate', 0)) * 100, 1))")
            python3 -c "import sys; c=float('${COVERAGE}'); t=float('${MIN_COVERAGE}'); sys.exit(0 if c>=t else 1)" \
              && echo "PASSED novapay-${SERVICE}: ${COVERAGE}% (threshold: ${MIN_COVERAGE}%)" \
              || { echo "FAILED novapay-${SERVICE}: ${COVERAGE}% is below ${MIN_COVERAGE}%"; GATE_FAILED=1; }
          done
          echo "========================================"
          if [ "$GATE_FAILED" -eq 1 ]; then
            echo "QUALITY GATE BLOCKED - fix coverage before deploying"
            exit 1
          else
            echo "QUALITY GATE PASSED - safe to deploy"
          fi

# ════════════════════════════════════════════════════════════
#  JOB 6: Deploy to Render (main branch only)
# ════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy payments
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_PAYMENTS }}" \
            && echo "✅ novapay-payments deploy triggered"
      - name: Deploy fraud
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_FRAUD }}" \
            && echo "✅ novapay-fraud deploy triggered"
      - name: Deploy lending
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_LENDING }}" \
            && echo "✅ novapay-lending deploy triggered"

# ════════════════════════════════════════════════════════════
#  JOB 7: Continuous Testing — run Synthetic monitors post-deploy
# ════════════════════════════════════════════════════════════
  continuous-testing:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g @datadog/datadog-ci --silent
      - name: Run synthetic monitors
        run: |
          echo "Waiting 30s for Render services to warm up..."
          sleep 30
          datadog-ci synthetics run-tests \
            --public-id eqy-nq8-ft3 \
            --public-id tnc-y4e-yws \
            --public-id dtq-msj-hsm \
            --public-id qjz-v3j-wpq \
            --tunnel
        env:
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_APP_KEY: ${{ secrets.DD_APP_KEY }}
        continue-on-error: true
